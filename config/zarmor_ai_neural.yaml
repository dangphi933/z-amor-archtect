# =====================================================================
# Z-ARMOR V7.5: NEURAL COGNITIVE ENGINE (AI TENSOR)
# =====================================================================
meta:
  version: "7.5.0_SaaS"
  description: "Cấu hình Mạng Nơ-ron (LSTM_PPO) và Cảm biến Entropy."

# 1. CẤU HÌNH LÕI DEEP LEARNING
neural_core:
  mode: "HYBRID"                            
  weights_path: "models/z_armor_agent.onnx" 
  inference_interval_ms: 500                
  fail_safe_latency_ms: 1000                

# 2. TRÍCH XUẤT ĐẶC TRƯNG (TENSOR INPUTS)
tensor_inputs:
  internal_state: ["current_z_load", "dynamic_capacity_ratio", "consecutive_losses", "kinetic_efficiency"] # 💡 Đã bổ sung biến Hiệu suất Động năng
  market_environment: ["atr_14_normalized", "tick_volume_ma", "spread_variance", "entropy_spikes"]
  operator_actions: ["requested_lot_size", "sl_distance_atr", "trade_direction_correlation"]

# 3. ĐẦU RA KỲ VỌNG & PHÁN QUYẾT (PREDICTIONS)
neural_outputs:
  fatal_ruin_threshold: 0.85     
  min_fit_score_allowed: 40.0    

# 4. HỌC MÁY THÍCH NGHI & PHẦN THƯỞNG (RL REWARDS)
adaptive_learning:
  win_streak_bonus: 0.10         
  loss_streak_penalty: 0.15      
  rl_rewards:
    optimal_flow_tick: +0.02         # Thưởng điểm khi duy trì trạng thái Optimal Flow (Vùng Vàng)
    absolute_zero_penalty: -0.01     # Phạt trừ điểm AI nếu để vốn đóng băng (Ngủ đông) quá lâu
    profit_with_optimal_z: +5.0      # Thưởng lớn: Ăn lãi khi năng lượng đang đốt ở mốc lý tưởng
    sl_with_turbulent_z: -10.0       # Phạt nặng: Cố chấp nhồi lệnh khi hệ thống đang hỗn loạn và bị dính SL