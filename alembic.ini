# alembic.ini — Z-Armor Cloud Engine
# KHÔNG hardcode sqlalchemy.url ở đây — dùng env var trong migrations/env.py

[alembic]
# Đường dẫn tới folder migrations
script_location = migrations

# Template cho tên file migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone cho file timestamps
timezone = UTC

# Max length của slug trong tên file
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Tự động format migration files với ruff sau khi tạo
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
