[alembic]

# thư mục migration

script_location = migrations

# encoding

prepend_sys_path = .

# timezone

timezone = UTC

# versioning

version_path_separator = os

# database connection

sqlalchemy.url = postgresql+psycopg2://postgres:Heniken933#@localhost:5432/zarmor

[post_write_hooks]

# optional formatter

# hooks = black

# black.type = console_scripts

# black.entrypoint = black

# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
level = NOTSET
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
