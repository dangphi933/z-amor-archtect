<!-- ============================================================
  STRATEGY SELECTOR COMPONENT
  Nhúng vào Cockpit.js hoặc standalone section trong dashboard.
  
  Chức năng:
  - Hiển thị 3 preset cards với màu, thông số
  - Highlight card đang active
  - POST /strategy/select khi trader bấm chọn
  - Toast confirm: "EA cập nhật trong ≤30s"
  
  Dependencies: fetch API, Tailwind-like inline CSS (dùng CSS vars từ Cockpit)
  ============================================================ -->

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Z-Armor — Strategy Selector</title>
<style>
:root {
  --bg:     #080C14;
  --panel:  #0D1620;
  --border: #1C2B3A;
  --text:   #E0E0E0;
  --dim:    #556677;
  --blue:   #00B4D8;
  --green:  #00C875;
  --orange: #FFA500;
  --red:    #E53935;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', 'Consolas', monospace;
  padding: 32px 24px;
  min-height: 100vh;
}

h2 {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 4px;
}
.subtitle {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 24px;
}

/* ── Strategy Cards Grid ── */
.strategy-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.strategy-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
}
.strategy-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color);
  opacity: 0.7;
}
.strategy-card:hover {
  border-color: var(--card-color);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.strategy-card.active {
  border-color: var(--card-color);
  box-shadow: 0 0 0 1px var(--card-color), 0 4px 20px rgba(0,0,0,0.4);
}
.strategy-card.active::before { opacity: 1; height: 3px; }

/* Card header */
.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}
.card-id {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-bottom: 3px;
}
.card-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--card-color);
  letter-spacing: -0.3px;
}
.active-badge {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 2px;
  background: color-mix(in srgb, var(--card-color) 15%, transparent);
  color: var(--card-color);
  border: 1px solid color-mix(in srgb, var(--card-color) 30%, transparent);
  white-space: nowrap;
  display: none;
}
.strategy-card.active .active-badge { display: block; }

/* Card stats */
.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px 12px;
  margin: 10px 0;
  font-size: 10px;
}
.stat-item { display: flex; flex-direction: column; gap: 1px; }
.stat-key { color: var(--dim); font-size: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-val { color: var(--text); font-weight: 600; }
.stat-val.colored { color: var(--card-color); }

/* Description */
.card-desc {
  font-size: 9px;
  color: var(--dim);
  line-height: 1.5;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* Symbols hint */
.symbols-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 8px;
}
.chip {
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 2px;
  background: rgba(255,255,255,0.04);
  color: var(--dim);
  border: 1px solid var(--border);
}

/* Select button */
.btn-select {
  width: 100%;
  margin-top: 12px;
  padding: 7px 0;
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 3px;
  border: 1px solid var(--card-color);
  background: color-mix(in srgb, var(--card-color) 10%, transparent);
  color: var(--card-color);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-select:hover {
  background: color-mix(in srgb, var(--card-color) 20%, transparent);
}
.strategy-card.active .btn-select {
  background: color-mix(in srgb, var(--card-color) 18%, transparent);
  cursor: default;
}

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #0D1F14;
  border: 1px solid var(--green);
  color: var(--green);
  font-size: 11px;
  padding: 10px 16px;
  border-radius: 4px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
  max-width: 320px;
  line-height: 1.4;
  z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--red); color: var(--red); background: #1F0D0D; }

/* ── Loading state ── */
.btn-select.loading { opacity: 0.5; pointer-events: none; }

/* ── Current status bar ── */
.status-bar {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 10px;
  margin-bottom: 20px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
.status-label { color: var(--dim); }
.status-val   { color: var(--text); font-weight: 600; }
.status-hint  { margin-left: auto; color: var(--dim); font-size: 9px; }
</style>
</head>
<body>

<h2>Chọn Chiến Lược EA</h2>
<p class="subtitle">Thay đổi có hiệu lực trong heartbeat kế tiếp (≤30s). EA không cần restart.</p>

<!-- Current active status -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-label">Đang chạy:</span>
  <span class="status-val" id="currentStrategyLabel">đang tải...</span>
  <span class="status-hint" id="statusHint">Thay đổi → EA cập nhật ≤30s</span>
</div>

<!-- Strategy Cards -->
<div class="strategy-grid" id="strategyGrid">
  <!-- Rendered by JS -->
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_BASE    = '';   // relative URL, nginx proxy
const licenseKey  = new URLSearchParams(location.search).get('license') || '';

// ── State ─────────────────────────────────────────────────────────────────────
let activeStrategyId = null;
let presets = [];

// ── Fetch presets + current active ───────────────────────────────────────────
async function init() {
  try {
    // 1. Load presets
    const r1 = await fetch(`${API_BASE}/strategy/presets`);
    const d1 = await r1.json();
    presets = d1.presets || [];

    // 2. Load current active (if licenseKey known)
    if (licenseKey) {
      const r2 = await fetch(`${API_BASE}/strategy/active?license_key=${licenseKey}`);
      if (r2.ok) {
        const d2 = await r2.json();
        activeStrategyId = d2.strategy_id || 'S1';
      }
    } else {
      activeStrategyId = 'S1'; // fallback for demo
    }

    renderCards();
    updateStatusBar();
  } catch (e) {
    console.error('Init error:', e);
    // Demo mode — render with mock active
    activeStrategyId = 'S1';
    renderCards();
  }
}

// ── Render strategy cards ─────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('strategyGrid');
  grid.innerHTML = '';

  presets.forEach(p => {
    const isActive = p.strategy_id === activeStrategyId;

    // Session bitmask → readable
    const sess = sessionLabel(p.session_filter);

    const card = document.createElement('div');
    card.className = 'strategy-card' + (isActive ? ' active' : '');
    card.style.setProperty('--card-color', p.color || '#00B4D8');
    card.dataset.sid = p.strategy_id;

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-id">${p.strategy_id}</div>
          <div class="card-name">${p.profile_name}</div>
        </div>
        <div class="active-badge">● ACTIVE</div>
      </div>

      <div class="card-stats">
        <div class="stat-item">
          <span class="stat-key">Entry</span>
          <span class="stat-val colored">${entryLabel(p.entry_type)}</span>
        </div>
        <div class="stat-item">
          <span class="stat-key">RR Ratio</span>
          <span class="stat-val">1 : ${p.rr_ratio.toFixed(1)}</span>
        </div>
        <div class="stat-item">
          <span class="stat-key">Min Score</span>
          <span class="stat-val">${p.min_score_entry}</span>
        </div>
        <div class="stat-item">
          <span class="stat-key">Risk Mode</span>
          <span class="stat-val">${p.risk_mode}</span>
        </div>
        <div class="stat-item">
          <span class="stat-key">Session</span>
          <span class="stat-val">${sess}</span>
        </div>
        <div class="stat-item">
          <span class="stat-key">Trailing SL</span>
          <span class="stat-val">${p.trailing_sl ? 'ON' : 'off'}</span>
        </div>
      </div>

      <div class="card-desc">${p.description}</div>

      <div class="symbols-chips">
        ${(p.symbols_hint || []).map(s => `<span class="chip">${s}</span>`).join('')}
      </div>

      <button class="btn-select" data-sid="${p.strategy_id}">
        ${isActive ? '✓ Đang chạy' : 'Chọn chiến lược này'}
      </button>
    `;

    grid.appendChild(card);
  });

  // Bind click events
  grid.querySelectorAll('.btn-select').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sid = btn.dataset.sid;
      if (sid !== activeStrategyId) selectStrategy(sid);
    });
  });
  grid.querySelectorAll('.strategy-card').forEach(card => {
    card.addEventListener('click', () => {
      const sid = card.dataset.sid;
      if (sid !== activeStrategyId) selectStrategy(sid);
    });
  });
}

// ── Select strategy ───────────────────────────────────────────────────────────
async function selectStrategy(sid) {
  if (!licenseKey) {
    showToast('⚠ Cần license key trong URL: ?license=ZARMOR-xxxxx', true);
    return;
  }

  const preset = presets.find(p => p.strategy_id === sid);
  if (!preset) return;

  // Optimistic UI
  const prevActive = activeStrategyId;
  activeStrategyId = sid;
  renderCards();
  updateStatusBar();

  try {
    const res = await fetch(`${API_BASE}/strategy/select`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: licenseKey, strategy_id: sid })
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      // Rollback
      activeStrategyId = prevActive;
      renderCards();
      updateStatusBar();
      showToast('✗ ' + (data.detail || data.message || 'Lỗi không xác định'), true);
      return;
    }

    showToast(`✓ Đã chuyển sang ${preset.profile_name}\n${data.message}`);
  } catch (err) {
    // Rollback on network error
    activeStrategyId = prevActive;
    renderCards();
    updateStatusBar();
    showToast('✗ Lỗi kết nối server', true);
  }
}

// ── Update status bar ─────────────────────────────────────────────────────────
function updateStatusBar() {
  const p = presets.find(x => x.strategy_id === activeStrategyId);
  const label = document.getElementById('currentStrategyLabel');
  if (label) {
    label.textContent = p ? `${p.strategy_id} — ${p.profile_name}` : activeStrategyId;
    if (p) label.style.color = p.color || '#00B4D8';
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function entryLabel(et) {
  if (et === 'BREAKOUT_ONLY') return 'Breakout';
  if (et === 'PULLBACK_ONLY') return 'Pullback';
  return 'Both';
}
function sessionLabel(mask) {
  const parts = [];
  if (mask & 1)  parts.push('ASIA');
  if (mask & 2)  parts.push('LON');
  if (mask & 4)  parts.push('NY');
  if (mask & 8)  parts.push('WKD');
  if (!parts.length || mask === 15) return 'ALL';
  return parts.join('+');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
